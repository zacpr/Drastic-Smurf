name: Build Packages

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload packages to (e.g. v0.1.5)"
        required: true
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build-deb:
    name: Build DEB (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libdbus-1-dev pkg-config

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb --verbose

      - name: Upload DEB to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_INPUT: ${{ github.event.inputs.tag }}
          TAG_WORKFLOW: ${{ github.event.workflow_run.head_branch }}
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG="${TAG_INPUT:-${TAG_WORKFLOW:-${TAG_REF}}}"
          TAG="${TAG:-$(git describe --tags --abbrev=0)}"
          echo "Uploading to release $TAG"
          gh release upload "$TAG" target/debian/*.deb --clobber

  build-rpm:
    name: Build RPM (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev libdbus-1-dev pkg-config

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Build release binary
        run: cargo build --release

      - name: Build .rpm package
        run: cargo generate-rpm

      - name: Upload RPM to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_INPUT: ${{ github.event.inputs.tag }}
          TAG_WORKFLOW: ${{ github.event.workflow_run.head_branch }}
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG="${TAG_INPUT:-${TAG_WORKFLOW:-${TAG_REF}}}"
          TAG="${TAG:-$(git describe --tags --abbrev=0)}"
          echo "Uploading to release $TAG"
          gh release upload "$TAG" target/generate-rpm/*.rpm --clobber
