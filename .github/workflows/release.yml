name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: drastic-smurf-linux-x86_64
            asset: drastic-smurf-linux-x86_64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            name: drastic-smurf-macos-x86_64
            asset: drastic-smurf-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            name: drastic-smurf-macos-aarch64
            asset: drastic-smurf-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: drastic-smurf-windows-x86_64.exe
            asset: drastic-smurf-windows-x86_64.zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-dev libxkbcommon-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/drastic-smurf dist/${{ matrix.name }}
          tar czvf ${{ matrix.asset }} -C dist ${{ matrix.name }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\drastic-smurf.exe dist\${{ matrix.name }}
          7z a ${{ matrix.asset }} .\dist\${{ matrix.name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
